<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1F3A"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2C7DEC"/>
      <stop offset="33%" stop-color="#1FB8C9"/>
      <stop offset="66%" stop-color="#F0B72C"/>
      <stop offset="100%" stop-color="#D6453F"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#sky)"/>
  <!-- Skyline silhouette -->
  <g fill="#06192E" opacity="0.55">
    <rect x="40"  y="540" width="60"  height="360"/>
    <rect x="105" y="480" width="80"  height="420"/>
    <rect x="200" y="600" width="50"  height="300"/>
    <rect x="260" y="520" width="100" height="380"/>
    <rect x="380" y="430" width="70"  height="470"/>
    <rect x="460" y="510" width="50"  height="390"/>
    <rect x="520" y="460" width="90"  height="440"/>
    <rect x="620" y="540" width="60"  height="360"/>
    <rect x="690" y="400" width="80"  height="500"/>
    <rect x="780" y="480" width="60"  height="420"/>
    <rect x="850" y="550" width="100" height="350"/>
    <rect x="960" y="430" width="70"  height="470"/>
    <rect x="1040" y="510" width="80" height="390"/>
    <rect x="1130" y="560" width="50" height="340"/>
  </g>
  <!-- Bridge / arc element -->
  <g fill="none" stroke="#2C7DEC" stroke-width="2" opacity="0.35">
    <path d="M 0 760 Q 600 600 1200 760"/>
    <path d="M 0 790 Q 600 640 1200 790"/>
  </g>
  <!-- Horizon highlight -->
  <line x1="0" y1="900" x2="1200" y2="900" stroke="url(#grad)" stroke-width="6"/>
  <!-- Subtle grid overlay -->
  <g stroke="#FFFFFF" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
  </g>
</svg>
