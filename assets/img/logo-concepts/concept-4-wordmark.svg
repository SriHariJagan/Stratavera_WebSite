<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" color="#0B1F3A" role="img" aria-label="Stratavera Partners">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap');
      .word { font-family: 'Inter', -apple-system, system-ui, sans-serif; font-weight: 700; fill: currentColor; letter-spacing: 0.012em; }
      .tag  { font-family: 'Inter', -apple-system, system-ui, sans-serif; font-weight: 500; fill: currentColor; opacity: 0.6; letter-spacing: 0.42em; }
    </style>
  </defs>

  <!-- WORDMARK centered -->
  <text x="360" y="100" text-anchor="middle" class="word" font-size="72">STRATAVERA</text>

  <!-- Stratified rule beneath wordmark — three short lines varying length, centered -->
  <g transform="translate(360, 130)" fill="currentColor">
    <rect x="-58" y="0"  width="116" height="3"/>
    <rect x="-30" y="9"  width="60"  height="3"/>
    <rect x="-12" y="18" width="24"  height="3"/>
  </g>

  <text x="360" y="184" text-anchor="middle" class="tag" font-size="17">PARTNERS</text>
</svg>
