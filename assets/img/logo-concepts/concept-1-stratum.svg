<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" color="#0B1F3A" role="img" aria-label="Stratavera Partners">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap');
      .word { font-family: 'Inter', -apple-system, system-ui, sans-serif; font-weight: 700; fill: currentColor; letter-spacing: 0.005em; }
      .tag  { font-family: 'Inter', -apple-system, system-ui, sans-serif; font-weight: 500; fill: currentColor; opacity: 0.62; letter-spacing: 0.32em; }
    </style>
  </defs>

  <!-- MARK: ascending stair of 5 strata -->
  <g transform="translate(40, 40)" fill="currentColor">
    <rect x="0"   y="116" width="68" height="14"/>
    <rect x="22"  y="87"  width="68" height="14"/>
    <rect x="44"  y="58"  width="68" height="14"/>
    <rect x="66"  y="29"  width="68" height="14"/>
    <rect x="88"  y="0"   width="68" height="14"/>
  </g>

  <!-- thin divider rule -->
  <line x1="246" y1="56" x2="246" y2="164" stroke="currentColor" stroke-width="1" opacity="0.18"/>

  <!-- WORDMARK -->
  <text x="276" y="122" class="word" font-size="58">STRATAVERA</text>
  <text x="278" y="156" class="tag" font-size="17">PARTNERS</text>
</svg>
